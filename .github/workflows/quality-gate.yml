name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server tests
        run: npm test

      - name: Run trajectory eval
        run: npm run eval:trajectory

      - name: Run planner eval
        run: npm run eval:planner

      - name: Check saved RAG quality gate
        run: npm run quality:gate -- --fail-on-warn

      - name: Check feedback data
        id: feedback
        working-directory: .
        run: |
          if [ -s server/data/feedback/feedback.jsonl ]; then
            echo "has_feedback=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_feedback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run feedback regression eval
        if: steps.feedback.outputs.has_feedback == 'true'
        run: npm run eval:feedback

      - name: Check feedback quality gate
        if: steps.feedback.outputs.has_feedback == 'true'
        run: npm run quality:gate -- --fail-on-warn
