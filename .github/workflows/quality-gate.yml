name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server tests
        run: npm test

      - name: Run trajectory eval
        run: npm run eval:trajectory

      - name: Run planner eval (mock)
        run: npm run eval:planner -- --provider mock

      - name: Run planner eval (real)
        if: env.OPENAI_API_KEY != ''
        run: npm run eval:planner -- --provider real

      - name: Run recovery observability eval
        run: npm run eval:recovery-observability

      - name: Run feedback regression eval
        run: npm run eval:feedback

      - name: Check quality gate
        run: npm run quality:gate -- --fail-on-warn
