name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - codex-agent-rag

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Check saved RAG quality gate
        run: npm run quality:gate -- --fail-on-warn
