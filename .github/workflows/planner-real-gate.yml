name: Planner Real Provider Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

jobs:
  planner-real-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agentai_smoke
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agentai_smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AGENT_EXECUTION_PLANNER: llm
      AGENT_INTENT_PLANNER: llm
      AGENT_PLANNER_ROLLOUT: llm
      LONG_MEMORY_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agentai_smoke
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POSTGRES_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/agentai_smoke

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run planner eval (mock)
        run: npm run eval:planner -- --provider mock

      - name: Run planner eval (real)
        run: npm run eval:planner -- --provider real

      - name: Run trajectory eval
        run: npm run eval:trajectory

      - name: Run recovery observability eval
        run: npm run eval:recovery-observability

      - name: Check real planner provider gate
        run: npm run planner:gate -- --provider real --compare-provider mock --max-unexpected-fallback-rate=0 --max-divergence-count=0

      - name: Check rollout readiness
        run: npm run rollout:readiness

      - name: Run pure LLM runtime smoke
        run: npm run runtime:smoke

      - name: Upload planner reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planner-provider-reports
          path: |
            server/evaluation/results/latest-planner*.*
            server/evaluation/results/latest-rollout-readiness.*
            server/evaluation/results/latest-runtime-smoke.*
          if-no-files-found: ignore
